<style>
  :root {
    --card-width: 130px;
    --card-height: 170px;
    --radius: 14px;
    --gap: 14px;
  }

  .badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-size:.9rem;
    margin-bottom:14px;
    background:#f0f0f0;
  }

  .cards-grid{
    display:grid;
    grid-template-columns: repeat(4, var(--card-width));
    gap: var(--gap);
    margin: 0 auto 18px auto;
    justify-content:center;
  }

  .card-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .flipcard{
    width: var(--card-width);
    height: var(--card-height);
    border-radius: var(--radius);
    display:grid;
    place-items:center;
    color:#fff;
    font-weight:700;
    letter-spacing:.5px;
    user-select:none;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    text-align:center;
    padding:10px;
    line-height:1.25;
    white-space:pre-line;
    font-size:14px;
  }

  .flipcard.red{
    background:#e63946;
  }

  .flipcard.black{
    background:#111;
  }

  .flipcard.mixed{
    background: linear-gradient(45deg, #e63946 0 50%, #111 50% 100%);
    text-shadow: 0 1px 3px rgba(0,0,0,.35);
  }

  .flipcard.blank{
    background:transparent;
    color:#666;
    border:2px dashed #bbb;
    box-shadow:none;
  }

  .option-box{
    max-width: 720px;
    margin: 0 auto 18px auto;
    padding: 16px 18px;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fafafa;
  }

  .option-title{
    font-weight:700;
    text-align:center;
    margin-bottom:12px;
  }

  .option-item{
    display:block;
    margin:10px 0;
    font-size:15px;
    line-height:1.6;
    cursor:pointer;
  }

  .option-item input{
    margin-right:8px;
    vertical-align:middle;
  }

  .txt-red{
    color:#e63946;
    font-weight:700;
  }

  .txt-black{
    color:#111;
    font-weight:700;
  }

  .note{
    max-width: 720px;
    margin: 0 auto 18px auto;
    color:#555;
    font-size:14px;
    line-height:1.6;
  }
</style>

<input type="hidden" name="choice_1" id="label1_input" value="Incentive">
<input type="hidden" name="choice_2" id="label2_input" value="">
<input type="hidden" name="choice_3" id="label3_input" value="">
<input type="hidden" name="choice_4" id="label4_input" value="Quality">

<input type="hidden" name="left_changed" id="left_changed_input" value="0">
<input type="hidden" name="right_changed" id="right_changed_input" value="0">

<script>
document.addEventListener('DOMContentLoaded', function () {
  const patterns = {
    opt1: {
      cards: ['Incentive', 'Incentive', 'Incentive', 'Quality'],
      left_changed: 0,
      right_changed: 0,
    },
    opt2: {
      cards: ['Incentive', 'Quality', 'Quality', 'Quality'],
      left_changed: 0,
      right_changed: 0,
    },
    opt3: {
      cards: ['Incentive', 'Incentive', 'Incentive', 'Mixed'],
      left_changed: 0,
      right_changed: 1,
    },
    opt4: {
      cards: ['Mixed', 'Quality', 'Quality', 'Quality'],
      left_changed: 1,
      right_changed: 0,
    }
  };

  function colorOf(lbl){
    if (lbl === 'Mixed') return 'mixed';
    return lbl === 'Incentive' ? 'red' : 'black';
  }

  function textOf(lbl){
    if (lbl === 'Incentive'){
      return '「先看到」\n產品指派資訊\n「再看到」\n抽球結果資訊';
    }
    if (lbl === 'Quality'){
      return '「先看到」\n抽球結果資訊\n「再看到」\n產品指派資訊';
    }
    return ' ';
  }

  function paintCard(idx, label){
    const el = document.querySelector('.flipcard[data-idx="' + idx + '"]');
    el.classList.remove('red', 'black', 'blank', 'mixed');
    el.classList.add(colorOf(label));
    el.textContent = textOf(label);
  }

  function applyOption(key){
    const cfg = patterns[key];
    if (!cfg) return;

    for (let i = 1; i <= 4; i++){
      paintCard(i, cfg.cards[i - 1]);
    }

    document.getElementById('left_changed_input').value = String(cfg.left_changed);
    document.getElementById('right_changed_input').value = String(cfg.right_changed);
  }

  // 初始畫面：左紅、右黑、中間空白
  const c1 = document.querySelector('.flipcard[data-idx="1"]');
  const c2 = document.querySelector('.flipcard[data-idx="2"]');
  const c3 = document.querySelector('.flipcard[data-idx="3"]');
  const c4 = document.querySelector('.flipcard[data-idx="4"]');

  c1.classList.add('red');
  c1.textContent = '「先看到」\n產品指派資訊\n「再看到」\n抽球結果資訊';

  c4.classList.add('black');
  c4.textContent = '「先看到」\n抽球結果資訊\n「再看到」\n產品指派資訊';

  c2.classList.add('blank');
  c3.classList.add('blank');

  document.querySelectorAll('input[name="card_option_selected"]').forEach(function(radio){
    radio.addEventListener('change', function(){
      applyOption(this.value);
    });
  });
});
</script>
