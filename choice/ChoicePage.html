<style>
  :root { 
    --card-width: 130px; 
    --card-height: 170px; 
    --radius: 14px; 
    --gap: 14px; 
  }

  .badge{
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    font-size:.9rem;
    margin-bottom:14px;
    background:#f0f0f0;
  }

  .middle-choice-box{
    max-width: 560px;
    margin: 0 auto 18px auto;
    padding: 14px 16px;
    border: 1px solid #ddd;
    border-radius: 12px;
    background: #fafafa;
  }

  .middle-choice-title{
    font-weight: 700;
    margin-bottom: 10px;
    text-align: center;
  }

  .middle-option{
    display: block;
    margin: 8px 0;
    font-size: 15px;
    cursor: pointer;
  }

  .middle-option input{
    margin-right: 8px;
  }

  .cards-grid{
    display:grid;
    grid-template-columns: repeat(4, var(--card-width));
    gap: var(--gap);
    margin-bottom: 18px;
    justify-content:center;
  }

  .card-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    perspective: 800px;
  }

  #cards .flipcard{
    width: var(--card-width);
    height: var(--card-height);
    border-radius: var(--radius);
    display:grid;
    place-items:center;
    color:#fff;
    font-weight:700;
    letter-spacing:.5px;
    user-select:none;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    transition:transform .08s ease, filter .15s ease;
    position:relative;
    overflow:hidden;
    text-align:center;
    padding:10px;
    line-height:1.25;
    white-space:pre-line;
    font-size:14px;
  }

  #cards .flipcard.clickable{
    cursor:pointer;
  }

  #cards .flipcard:active{
    transform:scale(.98);
  }

  #cards .flipcard.red{
    background:#e63946;
  }

  #cards .flipcard.black{
    background:#111;
  }

  #cards .flipcard.blank{
    background:transparent;
    color:#666;
    border:2px dashed #bbb;
  }

  #cards .flipcard:focus-visible{
    outline:3px solid #4c9ffe;
    outline-offset:3px;
  }

  .fee-hint{
    font-size:.9rem;
    color:#444;
    margin-top:6px;
    text-align:center;
  }

  @keyframes flipY {
    0%   { transform: rotateY(0deg); }
    49%  { transform: rotateY(90deg); }
    51%  { transform: rotateY(90deg); }
    100% { transform: rotateY(0deg); }
  }

  .flipY {
    animation: flipY .32s ease both;
    transform-style: preserve-3d;
    backface-visibility: hidden;
  }

  .flipcard.paint::after{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(135deg, var(--toColor, #222) 0%, var(--toColor, #222) 100%);
    transform: scaleX(0);
    transform-origin: left;
    animation: paintFill .28s ease forwards;
  }

  @keyframes paintFill{
    0%   { transform: scaleX(0); }
    100% { transform: scaleX(1); }
  }

  @media (prefers-reduced-motion: reduce){
    .flipY, .flipcard.paint::after{
      animation: none !important;
      transform: none !important;
    }
  }
</style>

<div class="badge">目前累積費用：<span id="fee">0</span> 法幣（最多 1）</div>

<div class="cards-grid" id="cards">
  <div class="card-wrap">
    <div class="flipcard clickable" data-idx="1" tabindex="0" aria-label="左卡"></div>
    <div class="fee-hint" id="left_hint" hidden>更改本張卡片的顏色要花費 0.5 法幣</div>
  </div>
  <div class="card-wrap">
    <div class="flipcard" data-idx="2" aria-label="中左卡"></div>
  </div>
  <div class="card-wrap">
    <div class="flipcard" data-idx="3" aria-label="中右卡"></div>
  </div>
  <div class="card-wrap">
    <div class="flipcard clickable" data-idx="4" tabindex="0" aria-label="右卡"></div>
    <div class="fee-hint" id="right_hint" hidden>更改本張卡片的顏色要花費 0.5 法幣</div>
  </div>
</div>

<div class="middle-choice-box">
  <div class="middle-choice-title">請選擇要放入中間兩張卡片的顏色：</div>
  <label class="middle-option">
    <input type="radio" name="middle_pair_choice" value="Incentive">
    放入兩張紅色
  </label>
  <label class="middle-option">
    <input type="radio" name="middle_pair_choice" value="Quality">
    放入兩張黑色
  </label>
</div>

<input type="hidden" name="choice_1" id="label1_input" value="Incentive">
<input type="hidden" name="choice_2" id="label2_input" value="">
<input type="hidden" name="choice_3" id="label3_input" value="">
<input type="hidden" name="choice_4" id="label4_input" value="Quality">

<input type="hidden" name="left_changed" id="left_changed_input" value="0">
<input type="hidden" name="right_changed" id="right_changed_input" value="0">

<script>
document.addEventListener('DOMContentLoaded', function(){
  const ORIGINAL_LEFT  = 'Incentive';
  const ORIGINAL_RIGHT = 'Quality';
  const FEE_PER_SIDE = 0.5;

  const feeEl = document.getElementById('fee');
  const leftHint  = document.getElementById('left_hint');
  const rightHint = document.getElementById('right_hint');
  const leftChangedInp  = document.getElementById('left_changed_input');
  const rightChangedInp = document.getElementById('right_changed_input');

  function colorOf(lbl){
    if (lbl === 'Incentive') return 'red';
    if (lbl === 'Quality') return 'black';
    return 'blank';
  }

  function textOf(lbl){
    if (lbl === 'Incentive'){
      return '「先看到」\n產品指派資訊\n「再看到」\n抽球結果資訊';
    }
    if (lbl === 'Quality'){
      return '「先看到」\n抽球結果資訊\n「再看到」\n產品指派資訊';
    }
    return '';
  }

  function colorHex(lbl){
    if (lbl === 'Incentive') return '#e63946';
    if (lbl === 'Quality')   return '#111111';
    return '#f5f5f5';
  }

  function flipLabel(lbl){
    if (lbl === 'Quality')   return 'Incentive';
    if (lbl === 'Incentive') return 'Quality';
    return 'Quality';
  }

  function setFromLabel(el, label){
    el.classList.remove('red','black','blank');
    el.classList.add(colorOf(label));
    el.textContent = textOf(label);

    const idx = el.getAttribute('data-idx');
    const inp = document.getElementById('label' + idx + '_input');
    if (inp) inp.value = label;

    el.setAttribute('data-label', label);
  }

  function refreshChangeState(){
    const leftEl  = document.querySelector('#cards .flipcard[data-idx="1"]');
    const rightEl = document.querySelector('#cards .flipcard[data-idx="4"]');

    const leftNow  = leftEl.getAttribute('data-label')  || ORIGINAL_LEFT;
    const rightNow = rightEl.getAttribute('data-label') || ORIGINAL_RIGHT;

    const leftChanged  = (leftNow  !== ORIGINAL_LEFT);
    const rightChanged = (rightNow !== ORIGINAL_RIGHT);

    if (leftHint)  leftHint.hidden  = !leftChanged;
    if (rightHint) rightHint.hidden = !rightChanged;

    if (leftChangedInp)  leftChangedInp.value  = leftChanged  ? '1' : '0';
    if (rightChangedInp) rightChangedInp.value = rightChanged ? '1' : '0';

    const sides = (leftChanged ? 1 : 0) + (rightChanged ? 1 : 0);
    const total = sides * FEE_PER_SIDE;
    if (feeEl) feeEl.textContent = String(total);
  }

  function animateFlip(el, newLabel){
    el.classList.add('flipY');
    const mid = setTimeout(() => { setFromLabel(el, newLabel); }, 160);

    el.addEventListener('animationend', function handler(){
      clearTimeout(mid);
      el.classList.remove('flipY');
      refreshChangeState();
      el.removeEventListener('animationend', handler);
    });
  }

  function animatePaint(el, newLabel){
    el.style.setProperty('--toColor', colorHex(newLabel));
    el.classList.add('paint');

    el.addEventListener('animationend', function handler(){
      setFromLabel(el, newLabel);
      el.classList.remove('paint');
      el.style.removeProperty('--toColor');
      el.removeEventListener('animationend', handler);
    }, { once: true });
  }

  function setMiddlePair(label){
    const el2 = document.querySelector('#cards .flipcard[data-idx="2"]');
    const el3 = document.querySelector('#cards .flipcard[data-idx="3"]');
    animatePaint(el2, label);
    animatePaint(el3, label);
  }

  const cards = document.querySelectorAll('#cards .flipcard');
  Array.prototype.forEach.call(cards, function(el){
    const idx = el.getAttribute('data-idx');

    if (idx === '1'){
      setFromLabel(el, ORIGINAL_LEFT);
    } else if (idx === '4'){
      setFromLabel(el, ORIGINAL_RIGHT);
    } else {
      el.classList.add('blank');
      el.textContent = '';
      el.setAttribute('data-label', '');
    }
  });

  refreshChangeState();

  const middleChoices = document.querySelectorAll('input[name="middle_pair_choice"]');
  Array.prototype.forEach.call(middleChoices, function(radio){
    radio.addEventListener('change', function(){
      if (this.checked){
        setMiddlePair(this.value);
      }
    });
  });

  Array.prototype.forEach.call(cards, function(el){
    el.addEventListener('click', function(){
      const idx = el.getAttribute('data-idx');

      if (idx === '2' || idx === '3'){
        return;
      }

      const cur = el.getAttribute('data-label') || (idx === '1' ? ORIGINAL_LEFT : ORIGINAL_RIGHT);
      const next = flipLabel(cur);
      animateFlip(el, next);
    });

    el.addEventListener('keydown', function(e){
      const idx = el.getAttribute('data-idx');
      if (idx === '2' || idx === '3') return;

      if (e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        el.click();
      }
    });
  });

  const form = document.querySelector('form');
  if (form){
    form.addEventListener('submit', function(){
      refreshChangeState();
    });
  }
});
</script>
